    <style>
        /* DISEÑO PERFECCIONADO: Distribución simétrica en el carrito para nombres extra-largos */
        #cartModal .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            padding: 12px 5px;
            border-bottom: 1px solid #333;
        }

        #cartModal .cart-item img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }

        #cartModal .cart-item-info {
            flex-grow: 1;
            flex-shrink: 1;
            min-width: 0; 
        }

        #cartModal .cart-item-info h4 {
            margin: 0 0 4px 0;
            font-size: 0.95rem;
            color: #fff;
            word-break: break-word; 
            line-height: 1.3;
        }

        #cartModal .cart-item-info span {
            font-size: 0.9rem;
            color: #ccc;
        }

        /* Maquetación rígida horizontal para el selector de cantidad en el Carrito */
        #cartModal .quantity-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            border: 1px solid #555;
            border-radius: 6px;
            overflow: hidden;
            max-width: 90px;
            flex-shrink: 0; 
        }

        #cartModal .quantity-input {
            width: 36px;
            height: 30px;
            text-align: center;
            background: #fff;
            color: #333;
            border: none;
            font-size: 0.95rem;
            font-weight: bold;
            outline: none;
            -moz-appearance: textfield;
            appearance: textfield;
        }

        #cartModal .quantity-input::-webkit-outer-spin-button,
        #cartModal .quantity-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        #cartModal .quantity-btn {
            width: 27px;
            height: 30px;
            background: #3a3a3a;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        #cartModal .quantity-btn:hover {
            background: #555;
        }

        /* Rediseño Outline para el botón Vaciar Carrito */
        #clearCartBtn {
            background: transparent !important;
            border: 1px solid #ff4757 !important;
            color: #ff4757 !important;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            outline: none;
        }

        #clearCartBtn:hover {
            background: #ff4757 !important;
            color: #fff !important;
        }

        /* INTERFAZ DESKTOP: Controles estándar del catálogo principal */
        .card-actions .quantity-selector {
            display: flex;
            align-items: center;
            border: 2px solid #d6a100; 
            border-radius: 6px;
            overflow: hidden;
            background: #fff;
            max-width: 110px;
            flex-grow: 1;
        }

        .card-actions .quantity-btn {
            background: #f1f3f5; 
            color: #d6a100;      
            border: none;
            width: 34px;
            height: 34px;
            font-size: 1.2rem;
            font-weight: 900;    
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .card-actions .quantity-btn:hover {
            background: #d6a100; 
            color: #ffffff;      
        }

        .card-actions .quantity-input {
            width: 42px;
            height: 34px;
            text-align: center;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            color: #2d2d2d;      
            outline: none;
            background: #fff;
        }

        /* 🚀 OPTIMIZACIONES EXCLUSIVAS PARA PANTALLAS MÓVILES */
        @media (max-width: 768px) {
            /* Oculta la descripción corta en celulares para evitar tarjetas alargadas */
            .card .description {
                display: none !important;
            }

            /* Homogeneiza la altura de los títulos para que la grilla quede simétrica */
            .card h3 {
                min-height: 42px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                font-size: 0.95rem !important;
                margin-bottom: 8px;
            }

            /* Margen controlado para el precio */

                margin-top: 5px !important;
                margin-bottom: 15px !important;
            }

            /* Estructura ergonómica para las píldoras de cantidad en el catálogo móvil */
            .card-actions {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                width: 100%;
                gap: 6px !important;
            }

            .card-actions .quantity-selector {
                max-width: 100% !important; 
                height: 36px;
                border: 2px solid #d6a100;
            }

            .card-actions .quantity-btn {
                width: 32px;

                font-size: 1.2rem;

            }

            .card-actions .quantity-input {
                flex-grow: 1;
                height: 36px;
                font-size: 1rem;
            }

            /* Margen de respiración para evitar solapamientos con botones flotantes */

                z-index: 999;
            }
            
            #product-sections-container {

<script>
    document.addEventListener('DOMContentLoaded', () => {

        const API = {
            data: null,
            async fetchData() {
                try {
                    const response = await fetch('./productos.json?v=' + new Date().getTime());
                    if (!response.ok) throw new Error(`Error HTTP: ${response.status}`);
                    this.data = await response.json();
                    return true;
                } catch (error) {
                    console.error("Error:", error);
                    document.getElementById('loading-indicator').innerHTML = '<p style="color:var(--rojo-error);">Error al cargar el catálogo.</p>';
                    return false;
                }
            },
            getPhoneNumber() {
                return this.data ? this.data.phoneNumber : '5491133974550';
            }
        };

        const Store = {
            state: { cart: [] },
            productMap: new Map(),
            productList: [],
            loadCart() {
                const savedCart = localStorage.getItem('cacahuateCart');
                if (savedCart) this.state.cart = JSON.parse(savedCart);
            },
            saveCart() {
                localStorage.setItem('cacahuateCart', JSON.stringify(this.state.cart));
            },
            addProduct(product, quantity) {
                const cartItem = this.getProductInCart(product.name);
                if (cartItem) {
                    cartItem.quantity += quantity;
                } else {
                    this.state.cart.push({ product: product, quantity: quantity });
                }
                this.saveCart();
            },
            updateQuantity(productName, newQuantity) {
                const cartItem = this.getProductInCart(productName);
                if (cartItem) {
                    if (newQuantity > 0) {
                        cartItem.quantity = newQuantity;
                    } else {
                        this.removeFromCart(productName);
                    }
                }
                this.saveCart();
            },
            removeFromCart(productName) {
                this.state.cart = this.state.cart.filter(item => item.product.name !== productName);
                this.saveCart();
            },
            clearCart() {
                this.state.cart = [];
                this.saveCart();
                document.querySelectorAll('.card .quantity-input').forEach(input => input.value = 0);
            },
            getProductInCart(productName) {
                return this.state.cart.find(item => item.product.name === productName);
            },
            getCartTotal() {
                return this.state.cart.reduce((total, item) => {
                    const price = item.product.price || 0;
                    return total + (price * item.quantity);
                }, 0);
            }
        };

        const UI = {
            elements: {
                navLinks: document.getElementById('navLinks'),
                productSectionsContainer: document.getElementById('product-sections-container'),
                mainContent: document.getElementById('main-content'),
                loadingIndicator: document.getElementById('loading-indicator'),
                hamburgerMenu: document.getElementById('hamburgerMenu'),
                cartCounter: document.getElementById('cartCounter'),
                cartModal: document.getElementById('cartModal'),
                productModal: document.getElementById('productModal'),
                imageZoomModal: document.getElementById('imageZoomModal'),
                cartItemsContainer: document.getElementById('cartItemsContainer'),
                emptyCartMessage: document.getElementById('emptyCartMessage'),
                checkoutBtn: document.getElementById('checkoutBtn'),
                globalSearchInput: document.getElementById('globalSearchInput'),
                clearSearchBtn: document.getElementById('clearSearchBtn'),
                suggestionsBox: document.getElementById('suggestionsBox'),
                globalNoResultsMessage: document.getElementById('globalNoResultsMessage'),
                cartTotal: document.getElementById('cartTotal'),
            },
            formatCurrency(value) {
                return new Intl.NumberFormat('es-AR', {
                    style: 'currency',
                    currency: 'ARS'
                }).format(value);
            },

            escapeHtmlAttr(str) {
                if (!str) return '';
                return str.replace(/"/g, '"').replace(/'/g, '');
            },

            normalizeText(str) {
                if (!str) return '';
                return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            },

            debounce(func, wait) {
                let timeout;
                return function(...args) {
                    const context = this;
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(context, args), wait);
                };
            },

            showToast(message) {
                const toast = document.getElementById("toast");
                if (!toast) return;
                
                toast.innerHTML = message;
                toast.className = "toast-notification show";
                setTimeout(function(){ 
                    toast.className = toast.className.replace("show", ""); 
                }, 3000);
            },

          createCardHTML(item) {
                let rawPrice = item.price;
                let parsedPrice = 0;
                let hasValidPrice = false;

                if (rawPrice !== undefined && rawPrice !== null) {
                    if (typeof rawPrice === 'string') {
                        let cleanPrice = rawPrice.replace(/\./g, '').replace(/,/g, '.').trim();
                        parsedPrice = parseFloat(cleanPrice);
                    } else {
                        parsedPrice = parseFloat(rawPrice);
                    }

                    if (!isNaN(parsedPrice)) {
                        hasValidPrice = true;
                    }
                }

                const priceText = hasValidPrice ? this.formatCurrency(parsedPrice) : 'Consultar precio';
                
                let images = Array.isArray(item.img) ? item.img : (item.img ? [item.img] : []);
                const mainImage = images.length > 0 ? images[0] : '';
                const safeName = this.escapeHtmlAttr(item.name);
                const safeImages = this.escapeHtmlAttr(JSON.stringify(images));

                const hasStock = item.stock !== false; 
                
                const stockClass = hasStock ? '' : 'no-stock';
                const stockBadge = hasStock ? '' : '<div class="out-of-stock-badge">SIN STOCK</div>';

                const existingItem = Store.getProductInCart(item.name);
                const initialQty = existingItem ? existingItem.quantity : 0;
                
                const quantitySelectorHtml = hasStock 
                    ? `<div class="quantity-selector">
                        <button class="quantity-btn decrease-qty">-</button>
                        <input type="number" class="quantity-input" value="${initialQty}" min="0" readonly>
                        <button class="quantity-btn increase-qty">+</button>
                       </div>`
                    : '<div style="flex-grow:1; text-align:center; color:#e74c3c; font-weight:bold; font-size:0.9em; padding: 10px 0;">AGOTADO</div>';

                let imageGalleryHtml = '';
                if (images.length > 1) {
                    let thumbs = '<div class="thumbnail-container">';
                    images.forEach((url, i) => {
                        const active = i === 0 ? 'active' : '';
                        thumbs += '<img src="' + url + '" class="thumbnail ' + active + '" data-img-src="' + url + '" alt="miniatura">';
                    });
                    thumbs += '</div>';
                    imageGalleryHtml = '<div class="image-gallery"><div class="main-image-container"><img src="' + mainImage + '" class="main-image" alt="' + safeName + '" loading="lazy"></div>' + thumbs + '</div>';
                } else {
                    imageGalleryHtml = '<div class="image-wrapper"><img src="' + mainImage + '" alt="' + safeName + '" loading="lazy" decoding="async"></div>';
                }

                return '<div class="card fade-in ' + stockClass + '" data-name="' + safeName + '" data-price="' + parsedPrice + '" data-img=\'' + safeImages + '\'>' +
                       stockBadge +
                       imageGalleryHtml +
                       '<div class="card-content">' +
                       '<h3>' + item.name + '</h3>' +
                       '<p class="description">' + (item.desc || '') + '</p>' +
                       '<div class="card-price" style="font-size: 1.4em; font-weight: bold; color: var(--azul-terroso-claro); margin-bottom: 15px;">' + priceText + '</div>' +
                       '<div class="card-actions" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">' +
                       quantitySelectorHtml +
                       '<button class="details-btn" style="flex-shrink:0; margin:0;"><i class="fas fa-eye"></i></button>' +
                       '</div></div></div>';

            renderCartItems() {
                const clearBtn = document.getElementById('clearCartBtn');
                const deliveryForm = document.getElementById('cartDeliveryForm');
                const progressContainer = document.getElementById('shippingProgressContainer');
                const progressText = document.getElementById('shippingProgressText');
                const progressBar = document.getElementById('shippingProgressBar');

                if (Store.state.cart.length === 0) {
                    this.elements.cartItemsContainer.innerHTML = '';
                    this.elements.cartItemsContainer.appendChild(this.elements.emptyCartMessage);
                    this.elements.emptyCartMessage.style.display = 'block';
                    this.elements.checkoutBtn.style.display = 'none';
                    this.elements.cartTotal.style.display = 'none';
                    if (clearBtn) clearBtn.style.display = 'none';
                    if (deliveryForm) deliveryForm.style.display = 'none';
                    if (progressContainer) progressContainer.style.display = 'none';
                } else {
                    this.elements.emptyCartMessage.style.display = 'none';
                    this.elements.checkoutBtn.style.display = 'inline-block';
                    this.elements.cartTotal.style.display = 'block';
                    if (clearBtn) clearBtn.style.display = 'inline-block';
                    if (deliveryForm) deliveryForm.style.display = 'block';
                    if (progressContainer) progressContainer.style.display = 'block';
                    
                    // Render de productos
                    this.elements.cartItemsContainer.innerHTML = Store.state.cart.map(item => {
                        const mainImage = Array.isArray(item.product.img) ? item.product.img[0] : item.product.img;
                        return `<div class="cart-item" data-name="${item.product.name}"><img src="${mainImage}" alt="${item.product.name}"><div class="cart-item-info"><h4>${item.product.name}</h4><span>${this.formatCurrency(item.product.price || 0)}</span></div><div class="quantity-selector"><button class="quantity-btn decrease-qty">-</button><input type="number" class="quantity-input" value="${item.quantity}" min="0" name="cart-quantity"><button class="quantity-btn increase-qty">+</button></div></div>`;
                    }).join('');
                    
                    const total = Store.getCartTotal();
                    this.elements.cartTotal.textContent = `Total: ${this.formatCurrency(total)}`;
                    
                    // 📉 LÓGICA DE BARRA DE ENVÍO GRATIS (Ejemplo: Envío gratis desde $15.000)
                    const META_ENVIO_GRATIS = 15000;
                    if (total >= META_ENVIO_GRATIS) {
                        progressText.innerHTML = `<i class="fas fa-truck"></i> ¡Genial! Tienes Envío Gratis en Lanús`;
                        progressBar.style.width = "100%";
                    } else {
                        const faltante = META_ENVIO_GRATIS - total;
                        progressText.innerHTML = `¡Estás a ${this.formatCurrency(faltante)} de conseguir Envío Gratis!`;
                        const porcentaje = (total / META_ENVIO_GRATIS) * 100;
                        progressBar.style.width = `${porcentaje}%`;
                    }

                    // 📅 LOGICA INTERNA DEL MENSAJE DE EMISIÓN DE COMPRA
                    const buildWhatsAppLink = () => {
                        const nameVal = document.getElementById('customerName').value.trim();
                        const methodVal = document.getElementById('deliveryMethod').value;
                        const addressVal = document.getElementById('customerAddress').value.trim();
                        const paymentVal = document.getElementById('paymentMethod').value;
                        const cashVal = parseFloat(document.getElementById('cashAmount').value) || 0;
                        const notesVal = document.getElementById('orderNotes').value.trim();

                        let productList = `*NUEVO PEDIDO - CACAHUATE DIETÉTICA*\n`;
                        productList += `==================================\n\n`;
                        productList += `👤 *Cliente:* ${nameVal || 'No especificado'}\n`;
                        productList += `🛵 *Entrega:* ${methodVal === 'envio' ? 'Envío a Domicilio' : 'Retiro en Local'}\n`;
                        
                        if (methodVal === 'envio' && addressVal !== '') {
                            productList += `📍 *Dirección:* ${addressVal}\n`;
                        }
                        
                        productList += `💳 *Pago:* ${paymentVal === 'efectivo' ? 'Efectivo' : 'Transferencia / Tarjeta'}\n`;
                        
                        if (paymentVal === 'efectivo' && cashVal > 0) {
                            productList += `💵 *Paga con:* ${this.formatCurrency(cashVal)}\n`;
                            if (cashVal >= total) {
                                productList += `🪙 *Vuelto:* ${this.formatCurrency(cashVal - total)}\n`;
                            }
                        }

                        if (notesVal !== '') {
                            productList += `📝 *Notas:* ${notesVal}\n`;
                        }

                        productList += `\n----------------------------------\n`;
                        productList += `📦 *PRODUCTOS:* \n`;
                        
                        Store.state.cart.forEach(item => {
                            productList += `- ${item.product.name} (x${item.quantity}) = ${this.formatCurrency(item.product.price * item.quantity)}\n`;
                        });
                        
                        productList += `\n==================================\n`;
                        productList += `*TOTAL A ABONAR: ${this.formatCurrency(total)}*`;
                        
                        if (total >= META_ENVIO_GRATIS && methodVal === 'envio') {
                            productList += `\n_(Envío Gratis Incluido)_`;
                        }

                        this.elements.checkoutBtn.href = `https://wa.me/${API.getPhoneNumber()}?text=${encodeURIComponent(productList)}`;
                    };

                    // Ejecutamos la función para tener el link inicial listo
                    buildWhatsAppLink();
                }
            },

            syncMainGridQuantities() {
                document.querySelectorAll('.card').forEach(card => {
                    const name = card.dataset.name;
                    const input = card.querySelector('.quantity-input');
                    if (input) {
                        const cartItem = Store.getProductInCart(name);
                        input.value = cartItem ? cartItem.quantity : 0;
                    }
                });
            },

            updateCartCounter() {
                const totalItems = Store.state.cart.reduce((sum, item) => sum + item.quantity, 0);
                this.elements.cartCounter.textContent = totalItems;
                this.elements.cartCounter.style.display = totalItems > 0 ? 'flex' : 'none';
            },

           renderLayout() {

        console.error("La estructura de grupos no está definida en productos.json");
        return;
    }

    let navLinksHTML = '';
    let sectionsHTML = '';

    const createSectionString = (id, title, desc) => {
        return `<section id="${id}-section" class="content-section fade-in">
                    <h1>${title}</h1>
                    <p class="section-description">${desc || ''}</p>
                </section>
                <div id="${id}-grid" class="cards-grid"></div>`;
    };

    API.data.groups.forEach(group => {
        const groupName = group.title;
        const categoryIds = group.categories;

        const groupCategories = categoryIds.map(id => 
            API.data.categories.find(c => c.id === id)
        ).filter(item => item !== undefined);

        if (groupCategories.length > 0) {
            groupCategories.sort((a, b) => a.title.localeCompare(b.title));

            let dropdownContentHTML = '';

            groupCategories.forEach(cat => {
                if (cat.subcategories && cat.subcategories.length > 1) {
                    const brandsLinks = cat.subcategories
                        .map(brand => `<a href="#${brand.id}-section" class="brand-link">${brand.title}</a>`)
                        .join('');

                    dropdownContentHTML += `

                            </button>
                            <div class="menu-brands-container">
                                ${brandsLinks}
                            </div>
                        </div>`;
                } 
                else if (cat.subcategories && cat.subcategories.length === 1) {
                    dropdownContentHTML += `<a href="#${cat.subcategories[0].id}-section" class="menu-category-direct-link">${cat.title}</a>`;
                } 
                else {
                    dropdownContentHTML += `<a href="#${cat.id}-section" class="menu-category-direct-link">${cat.title}</a>`;
                }
            });

            navLinksHTML += `<div class="dropdown">
                                <button class="dropbtn">
                                    ${groupName} <i class="fas fa-caret-down"></i>
                                </button>
                                <div class="dropdown-content">
                                    ${dropdownContentHTML}
                                </div>
                             </div>`;
        }
    });

    API.data.categories.forEach(category => {
        if (category.subcategories && category.subcategories.length > 0) {
            category.subcategories.sort((a, b) => a.title.localeCompare(b.title));
            category.subcategories.forEach(sub => {
                sectionsHTML += createSectionString(sub.id, sub.title, sub.desc);
            });
        } else {
            sectionsHTML += createSectionString(category.id, category.title, category.desc);
        }
    });

    this.elements.navLinks.innerHTML = navLinksHTML;
    this.elements.productSectionsContainer.innerHTML = sectionsHTML;
},

},

            renderAllProducts() {
                for (const categoryId in API.data.products) {
                    const grid = document.getElementById(`${categoryId}-grid`);
                    if (grid) {
                        grid.innerHTML = API.data.products[categoryId].map(item => this.createCardHTML(item)).join('');
                    }
                }
            },

            toggleModal(modal, show) {
                modal.style.display = show ? "flex" : "none";
                if (!show && modal === this.elements.cartModal) {
                    this.syncMainGridQuantities();
                }
            },

            openProductModal(card) {
                const name = card.dataset.name;
                const price = card.dataset.price;
                const images = JSON.parse(card.dataset.img || '[]');
                const product = Store.productMap.get(name);
                
                document.getElementById("modalTitle").textContent = name;
                document.getElementById("modalImg").src = images[0] || 'https://placehold.co/400x400/2F2F2F/FFFFFF?text=Imagen+no+disponible';
                document.getElementById("modalDescriptionText").textContent = product ? product.desc : 'Sin descripción';
                document.getElementById("modalPriceText").innerHTML = `<strong style='font-size:1.2em;'>Precio: ${this.formatCurrency(parseFloat(price || '0'))}</strong>`;
                document.getElementById("modalWhatsappBtn").href = `https://wa.me/${API.getPhoneNumber()}?text=${encodeURIComponent(`Hola, quisiera consultar sobre el producto: ${name}`)}`;
                this.toggleModal(this.elements.productModal, true);
            },
            
            openZoomModal(src) {
                const modal = this.elements.imageZoomModal;
                const img = document.getElementById('zoomImg');
                img.src = src;
                this.toggleModal(modal, true);
            },

            showMainContent() {
                this.elements.loadingIndicator.style.display = 'none';
                this.elements.mainContent.style.display = 'block';
            },

            initScrollAnimations() {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) entry.target.classList.add('is-visible');
                    });
                }, { threshold: 0.1 });
                document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
            },

            initHeroCarousel() {
                const slides = document.querySelectorAll('#heroCarousel img');
                if (slides.length === 0) return;
                let currentSlide = 0;
                setInterval(() => {
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }, 5000); 
            },

            renderSuggestions(matches) {
                const box = this.elements.suggestionsBox;
                box.innerHTML = '';
                
                if (matches.length === 0) {
                    box.style.display = 'none';
                    return;
                }

                matches.slice(0, 6).forEach(product => {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    const imgUrl = (Array.isArray(product.img) && product.img.length > 0) ? product.img[0] : 'https://placehold.co/50x50?text=IMG';
                    item.innerHTML = `<img src="${imgUrl}" alt="miniatura"><span>${product.name}</span>`;
                    item.addEventListener('click', () => {
                        this.elements.globalSearchInput.value = product.name;
                        box.style.display = 'none';
                        this.handleSearch(true);
                    });
                    box.appendChild(item);
                });
                box.style.display = 'block';
            },
            handleSearch(scrollToFirst = false) {
                const rawSearch = UI.elements.globalSearchInput.value || '';
                
                // Normalizamos el término de búsqueda global (minúsculas y sin acentos)
                const searchNormalized = this.normalizeText(rawSearch.trim());
                
                // Dividimos la búsqueda en palabras sueltas (tokens) ignorando espacios vacíos
                const searchWords = searchNormalized.split(/\s+/).filter(word => word.length > 0);
                
                let totalVisibleCards = 0;
                let firstCardFound = null;

                if (this.elements.clearSearchBtn) {
                    this.elements.clearSearchBtn.style.display = rawSearch.length > 0 ? 'block' : 'none';
                }

                // SI LA BARRA ESTÁ VACÍA: Reseteamos y mostramos todo el catálogo
                if (searchWords.length === 0) {
                    this.elements.suggestionsBox.style.display = 'none';
                    document.querySelectorAll('.cards-grid').forEach(grid => {
                        grid.style.style.display = 'grid';
                        if (grid.previousElementSibling) grid.previousElementSibling.style.display = 'block';
                        grid.querySelectorAll('.card').forEach(c => c.style.display = 'flex');
                    });
                    if (this.elements.globalNoResultsMessage) this.elements.globalNoResultsMessage.style.display = 'none';
                    this.syncMainGridQuantities(); 
                    return;
                }

                // PROCESAMOS EL FILTRADO EN CADA GRILLA DE CATEGORÍA
                document.querySelectorAll('.cards-grid').forEach(grid => {
                    let visibleCardsInGrid = 0;
                    
                    // Verificamos si las palabras coinciden con el título de la sección (ej: "Almacén Natural")
                    let isCategoryMatch = false;
                    const section = grid.previousElementSibling;
                    if (section && section.classList.contains('content-section')) {
                        const titleElement = section.querySelector('h1');
                        if (titleElement) {
                            const categoryTitle = this.normalizeText(titleElement.innerText);
                            isCategoryMatch = searchWords.every(word => categoryTitle.includes(word));
                        }
                    }

                    // Filtramos cada tarjeta de producto de forma inteligente
                    grid.querySelectorAll('.card').forEach(card => {
                        const productName = card.dataset.name || '';
                        
                        // Intentamos recuperar el objeto original del mapa para leer descripción o variaciones ocultas
                        const productData = Store.productMap.get(productName);
                        
                        // Consolidamos toda la información del producto en una sola cadena de texto normalizada
                        let searchableText = productName;
                        if (productData) {
                            searchableText += ' ' + (productData.desc || '') + ' ' + (productData.brand || '');
                        }
                        const productInfoNormalized = this.normalizeText(searchableText);

                        // 📍 EL CORAZÓN DE LA LOGICA: Cada palabra buscada debe existir en la info del producto o de la categoría
                        const isProductMatch = searchWords.every(word => productInfoNormalized.includes(word));
                        const showCard = isProductMatch || isCategoryMatch;
                        
                        card.style.display = showCard ? 'flex' : 'none';
                        
                        if (showCard) {
                            visibleCardsInGrid++;
                            totalVisibleCards++;
                            if (!firstCardFound) firstCardFound = card;
                        }
                    });

                    // Si no quedan productos visibles en esta grilla, ocultamos el título y el contenedor de la sección
                    if (section) section.style.display = visibleCardsInGrid > 0 ? 'block' : 'none';
                    grid.style.display = visibleCardsInGrid > 0 ? 'grid' : 'none';
                });

                // RENDERIZAMOS LAS SUGERENCIAS TIPO "GOOGLING" EN TIEMPO REAL
                if (!scrollToFirst) { 
                    const suggestions = Store.productList.filter(product => {
                        const nameNormalized = this.normalizeText(product.name);
                        const descNormalized = this.normalizeText(product.desc || '');
                        const combined = nameNormalized + ' ' + descNormalized;
                        return searchWords.every(word => combined.includes(word));
                    });
                    this.renderSuggestions(suggestions);
                }

                // MENSAJE DE ERROR COHESIVO SI NO HAY COINCIDENCIAS
                if (UI.elements.globalNoResultsMessage) {
                    UI.elements.globalNoResultsMessage.style.display = (totalVisibleCards === 0) ? 'block' : 'none';
                }

                // SCROLL SUAVE AUTOMÁTICO EN CASO DE APRETAR ENTER O CLICK EN SUGERENCIA
                if (scrollToFirst && firstCardFound) {
                    setTimeout(() => {
                        const yOffset = -120; 
                        const y = firstCardFound.getBoundingClientRect().top + window.pageYOffset + yOffset;
                        window.scrollTo({top: y, behavior: 'smooth'});
                    }, 100);
                }
            },
        };

        const App = {
            async init() {
                const dataLoaded = await API.fetchData();
                if (!dataLoaded) return;
                Store.loadCart();
                
                UI.renderLayout();
                UI.buildMobileMenu();
                UI.renderAllProducts();
                
                for (const categoryId in API.data.products) {
                    API.data.products[categoryId].forEach(product => {
                        Store.productMap.set(product.name, product);
                        Store.productList.push(product);
                    });
                }
                
                UI.updateCartCounter();
                UI.showMainContent();
                UI.initScrollAnimations();
                UI.initHeroCarousel();
                this.setupEventListeners();
            },

            setupEventListeners() {
                document.body.addEventListener('click', (e) => {
                    const card = e.target.closest('.card');
                    if (card) {
                        if (e.target.matches('.thumbnail')) {
                            const mainImage = card.querySelector('.main-image');
                            const newSrc = e.target.dataset.imgSrc;
                            if (mainImage && newSrc) mainImage.src = newSrc;
                            card.querySelectorAll('.thumbnail').forEach(thumb => thumb.classList.remove('active'));
                            e.target.classList.add('active');
                        } else if (e.target.closest('.main-image-container, .image-wrapper')) {
                             const imageToZoom = card.querySelector('.main-image') || card.querySelector('.image-wrapper img');
                             if (imageToZoom) UI.openZoomModal(imageToZoom.src);
                        } else if (e.target.closest('.details-btn')) {
                            UI.openProductModal(card);
                        } else if (e.target.matches('.quantity-btn')) {
                            const input = card.querySelector('.quantity-input');
                            if(input){
                                let currentValue = parseInt(input.value, 10);
                                const productName = card.dataset.name;
                                const productPrice = parseFloat(card.dataset.price || '0');
                                const productImg = JSON.parse(card.dataset.img || '[]');
                                
                                const productObj = { name: productName, price: productPrice, img: productImg };

                                if (e.target.matches('.increase-qty')) {
                                    input.value = currentValue + 1;
                                    Store.addProduct(productObj, 1);
                                    UI.updateCartCounter();
                                    UI.showToast(`<i class="fas fa-cart-plus"></i> Añadido: ${productName}`);
                                } 
                                else if (e.target.matches('.decrease-qty') && currentValue > 0) {
                                    input.value = currentValue - 1;
                                    const itemInCart = Store.getProductInCart(productName);
                                    if (itemInCart) {
                                        Store.updateQuantity(productName, itemInCart.quantity - 1);
                                    }
                                    UI.updateCartCounter();
                                }
                            }
                        }
                    }
                    
                    if (!e.target.closest('.search-bar-container')) {
                        UI.elements.suggestionsBox.style.display = 'none';
                    }
                });

                document.addEventListener('click', (e) => {
                     if (e.target.closest('.close-button') || e.target.classList.contains('modal')) {
                        UI.toggleModal(UI.elements.productModal, false);
                        UI.toggleModal(UI.elements.imageZoomModal, false);
                        UI.toggleModal(UI.elements.cartModal, false);
                    }
                });

                UI.elements.cartModal.addEventListener('click', (e) => {
                    const cartItem = e.target.closest('.cart-item');
                    if (!cartItem) return;
                    const productName = cartItem.dataset.name;
                    const input = cartItem.querySelector('.quantity-input');
                    if(!input) return;
                    let quantity = parseInt(input.value, 10);
                    if (e.target.matches('.increase-qty')) Store.updateQuantity(productName, quantity + 1);
                    else if (e.target.matches('.decrease-qty')) Store.updateQuantity(productName, quantity - 1);
                    UI.renderCartItems();
                    UI.updateCartCounter();
                });

                UI.elements.cartModal.addEventListener('change', (e) => {
                    if (e.target.matches('.quantity-input[name="cart-quantity"]')) {
                        const cartItem = e.target.closest('.cart-item');
                        if(!cartItem) return;
                        const newQuantity = parseInt(e.target.value, 10);
                        Store.updateQuantity(cartItem.dataset.name, newQuantity);
                        UI.renderCartItems();
                        UI.updateCartCounter();
                    }
                });

                UI.elements.cartModal.addEventListener('input', (e) => {
                    if (e.target.matches('.quantity-input[name="cart-quantity"]')) {
                        const cartItem = e.target.closest('.cart-item');
                        if (!cartItem) return;
                        
                        let newQuantity = parseInt(e.target.value, 10);
                        if (isNaN(newQuantity) || newQuantity < 0) {
                            newQuantity = 0;
                        }
                        
                        Store.updateQuantity(cartItem.dataset.name, newQuantity);
                        const total = Store.getCartTotal();
                        UI.elements.cartTotal.textContent = `Total: ${UI.formatCurrency(total)}`;
                        UI.updateCartCounter();
                    }
                });

                document.getElementById('cartBtn').addEventListener('click', () => {
                    UI.renderCartItems();
                    UI.toggleModal(UI.elements.cartModal, true);
                });

                UI.elements.hamburgerMenu.addEventListener('click', () => {
                    const container = document.getElementById('mobile-menu-container');
                    if (!container) return;
                    const isOpen = container.classList.toggle('open');
                    document.body.classList.toggle('menu-open', isOpen);
                    document.documentElement.classList.toggle('menu-open', isOpen);
                    if (!isOpen) {
                        container.classList.remove('sub-panel-active');
                        const mainPanel = container.querySelector('.mobile-panel.main-panel');
                        if (mainPanel) mainPanel.classList.add('active');
                        container.querySelectorAll('.mobile-panel.sub-panel').forEach(p => p.classList.remove('active'));
                    }
                });

                document.getElementById('mobile-menu-container').addEventListener('click', (e) => {
                    const container = document.getElementById('mobile-menu-container');
                    const trigger = e.target.closest('.mobile-nav-trigger');
                    if (trigger) {
                        e.preventDefault();
                        const targetPanel = container.querySelector(`#${trigger.dataset.targetPanel}`);
                        if (targetPanel) {
                            container.classList.add('sub-panel-active');
                            targetPanel.classList.add('active');
                        }
                    }
                    const backButton = e.target.closest('.mobile-nav-back');
                    if (backButton) {
                        e.preventDefault();
                        container.classList.remove('sub-panel-active');
                        backButton.closest('.mobile-panel').classList.remove('active');
                    }
                    const finalLink = e.target.closest('.mobile-nav-link');
                    if (finalLink) {
                        container.classList.remove('open');
                        document.body.classList.remove('menu-open');
                        document.documentElement.classList.remove('menu-open');
                        container.classList.remove('sub-panel-active');
                        container.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
                    }
                });

                document.body.addEventListener('click', (e) => {
                    const container = document.getElementById('mobile-menu-container');
                    if (!container || !container.classList.contains('open')) return;
                    if (e.target.closest('#' + UI.elements.hamburgerMenu.id)) return;
                    if (e.target.closest('#' + container.id)) return;
                    container.classList.remove('open');
                    document.body.classList.remove('menu-open');
                    document.documentElement.classList.remove('menu-open');
                    container.classList.remove('sub-panel-active');
                    container.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
                });

                const debouncedSearch = UI.debounce(() => UI.handleSearch(false), 300);
                
                UI.elements.globalSearchInput.addEventListener('input', debouncedSearch);
                UI.elements.globalSearchInput.addEventListener('focus', () => {
                    if(UI.elements.globalSearchInput.value.trim() !== '') UI.handleSearch(false);
                });

                if (UI.elements.clearSearchBtn) {
                    UI.elements.clearSearchBtn.addEventListener('click', () => {
                        UI.elements.globalSearchInput.value = '';
                        UI.handleSearch(false);
                        UI.elements.globalSearchInput.focus();
                    });
                }

                const clearCartBtnElement = document.getElementById('clearCartBtn');
                if (clearCartBtnElement) {
                    clearCartBtnElement.addEventListener('click', () => {
                        if (confirm("¿Estás seguro de que deseas vaciar todo tu pedido?")) {
                            Store.clearCart();
                            UI.renderCartItems();
                            UI.updateCartCounter();
                            UI.showToast('<i class="fas fa-trash-alt"></i> El carrito ha sido vaciado.');
                        }
                    });
                }

                /* ==========================================================================
                   📍 CONTROL DINÁMICO DEL BOTÓN VOLVER ARRIBA
                   ========================================================================== */
                const scrollTopBtn = document.getElementById('scrollToTopBtn');
                if (scrollTopBtn) {
                    window.addEventListener('scroll', () => {
                        if (window.pageYOffset > 400) {
                            scrollTopBtn.classList.add('show');
                        } else {
                            scrollTopBtn.classList.remove('show');
                        }
                    });

                    scrollTopBtn.addEventListener('click', () => {
                        window.scrollTo({
                            top: 0,
                            behavior: 'smooth'
                        });
                    });
                }

                /* ==========================================================================
                   📍 OBSERVADORES DINÁMICOS DEL FORMULARIO DEL CARRITO
                   ========================================================================== */
                document.body.addEventListener('input', (e) => {
                    if (e.target.closest('#cartDeliveryForm')) {
                        const total = Store.getCartTotal();
                        if (total > 0) UI.renderCartItems();
                    }
                });

                document.body.addEventListener('change', (e) => {
                    if (e.target.id === 'deliveryMethod') {
                        const addressBlock = document.getElementById('deliveryAddressBlock');
                        if (addressBlock) {
                            addressBlock.style.display = e.target.value === 'envio' ? 'block' : 'none';
                        }
                        UI.renderCartItems();
                    }
                    if (e.target.id === 'paymentMethod') {
                        const cashBlock = document.getElementById('cashChangeBlock');
                        if (cashBlock) {
                            cashBlock.style.display = e.target.value === 'efectivo' ? 'block' : 'none';
                        }
                        UI.renderCartItems();
                    }
                });

                const checkoutButtonElement = document.getElementById('checkoutBtn');
                if (checkoutButtonElement) {
                    checkoutButtonElement.addEventListener('click', (e) => {
                        const nameVal = document.getElementById('customerName').value.trim();
                        const methodVal = document.getElementById('deliveryMethod').value;
                        const addressVal = document.getElementById('customerAddress').value.trim();

                        if (nameVal === '') {
                            e.preventDefault();
                            alert('Por favor, ingresa tu Nombre antes de enviar el pedido.');
                            document.getElementById('customerName').focus();
                            return;
                        }

                        if (methodVal === 'envio' && addressVal === '') {
                            e.preventDefault();
                            alert('Por favor, ingresa tu Dirección y Localidad para realizar el envío.');
                            document.getElementById('customerAddress').focus();
                            return;
                        }
                    });
                }
            },
        };

        App.init();
    });

    window.toggleSubMenu = function(btn) {
        btn.classList.toggle('active');
        const container = btn.nextElementSibling;
        if (container) {
            container.classList.toggle('show');
        }
    };
</script>
</body>
</html>
